name: lo
description: "Lỗ - Lỗ nhiều chưa? Gold loss tracker with memes for Vietnamese gold holders"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.69.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # Networking + parsing (SjcPriceAdapter)
  http: ^1.2.2
  xml: ^6.5.0

  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/logo.png

# Cấu hình flutter_launcher_icons.
# Chạy: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/logo.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#121212"
    theme_color: "#FFD700"
  windows:
    generate: false
  macos:
    generate: false
  # Adaptive icon Android 8+ — foreground là logo, background màu đen chủ đạo.
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21
