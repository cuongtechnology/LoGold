# Codemagic CI/CD config cho app Lỗ.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# Codemagic free tier: 500 phút build/tháng trên macOS instance — dùng
# cho iOS. Android + Web build trên Linux instance nên rẻ hơn nhiều.
#
# Bật config này:
#   1. Đăng nhập codemagic.io bằng GitHub
#   2. Thêm app "cuongtechnology/LoGold"
#   3. Chọn "codemagic.yaml" thay vì UI workflow

workflows:
  # ─────────────────────────────────────────────────────────────
  # Web + Android — chạy mọi push lên main và mỗi tag v*
  # ─────────────────────────────────────────────────────────────
  web-android-workflow:
    name: Web + Android
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: 3.35.4
      java: 17
      groups:
        - android_release  # Chứa CM_KEYSTORE_B64, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
      vars:
        PACKAGE_NAME: "vn.lo.app"
        # URL công khai của Cloudflare Worker (không phải secret) — cần
        # truyền vào lúc build release để app đăng ký FCM token, nếu không
        # push notification báo "Đã bật, chưa kết nối server gửi thông báo".
        LO_WORKER_URL: "https://lo-gold-proxy.webjscloud.workers.dev"

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get

      - name: Flutter analyze
        script: |
          # Bỏ 2 cờ khi đã dọn hết warning.
          flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Flutter test
        script: |
          flutter test || echo "Tests hiện chỉ có placeholder, tiếp tục."

      - name: Build web release
        script: |
          flutter build web --release --no-wasm-dry-run

      - name: Zip web bundle
        script: |
          cd build/web
          zip -r $CM_BUILD_DIR/lo-web.zip .

      - name: Build APK debug
        script: |
          flutter build apk --debug

      # Setup release signing nếu có secret CM_KEYSTORE_B64 trong env.
      # Config secret ở Codemagic UI: Teams → Environment variables → group `android_release`.
      - name: Setup Android signing
        script: |
          if [ -n "$CM_KEYSTORE_B64" ]; then
            echo "$CM_KEYSTORE_B64" | base64 -d > $CM_BUILD_DIR/android/app/lo-release.jks
            cat > $CM_BUILD_DIR/android/key.properties <<EOF
          storeFile=lo-release.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
            echo "✓ Signed release keystore ready"
          else
            echo "⚠ CM_KEYSTORE_B64 empty — release APK sẽ dùng debug key"
          fi

      - name: Build APK release
        script: |
          flutter build apk --release --dart-define=LO_WORKER_URL=$LO_WORKER_URL

      # Google Play Console bắt buộc .aab (Android App Bundle) để nộp app
      # mới — .apk ở trên chỉ dùng để cài thử/phân phối ngoài Play Store.
      - name: Build AAB release cho Play Store
        script: |
          flutter build appbundle --release --dart-define=LO_WORKER_URL=$LO_WORKER_URL

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - lo-web.zip

    publishing:
      email:
        recipients:
          - ttc99x@gmail.com
        notify:
          success: true
          failure: true
      # GitHub Release chỉ khi tag v*
      github_releases:
        prerelease: false
        artifact_patterns:
          - '*.apk'
          - '*.aab'
          - lo-web.zip

  # ─────────────────────────────────────────────────────────────
  # iOS — chỉ chạy khi tag v* để tiết kiệm phút macOS
  # ─────────────────────────────────────────────────────────────
  ios-workflow:
    name: iOS unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get

      - name: Pod install
        script: |
          cd ios && pod install

      - name: Build iOS (không codesign)
        script: |
          flutter build ios --release --no-codesign

      - name: Đóng gói IPA unsigned
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr $CM_BUILD_DIR/lo-ios-unsigned.ipa Payload
          rm -rf Payload

    artifacts:
      - lo-ios-unsigned.ipa

    publishing:
      email:
        recipients:
          - ttc99x@gmail.com
        notify:
          success: true
          failure: true
      github_releases:
        prerelease: false
        artifact_patterns:
          - '*.ipa'

