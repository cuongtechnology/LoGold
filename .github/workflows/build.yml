name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.35.4'
  FLUTTER_CHANNEL: 'stable'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.19.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Diagnostic — flutter doctor
        run: flutter doctor -v

      - run: flutter pub get

      # Không chặn build vì 9 warning cũ chưa dọn; bỏ 2 cờ này khi đã clean.
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.19.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Diagnostic — flutter doctor
        run: flutter doctor -v

      - run: flutter pub get
      - run: flutter test

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.19.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Diagnostic — flutter doctor
        run: flutter doctor -v

      - run: flutter pub get
      - run: flutter build web --release --no-wasm-dry-run

      - uses: actions/upload-artifact@v4
        with:
          name: web-${{ github.sha }}
          path: build/web/
          retention-days: 14

      - name: Zip web build for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/web
          zip -r ../../lo-web-${{ github.ref_name }}.zip .

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: web-release-zip
          path: lo-web-${{ github.ref_name }}.zip
          retention-days: 30

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2.19.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Diagnostic — flutter doctor
        run: flutter doctor -v

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      # Setup release signing khi tag v* + có secret ANDROID_KEYSTORE_B64.
      # Nếu secret rỗng → key.properties không tồn tại → build.gradle.kts
      # fallback debug key → APK release vẫn có nhưng unsigned.
      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_B64 != ''
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/lo-release.jks
          cat > android/key.properties <<EOF
          storeFile=lo-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: apk-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: apk-release-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # Chỉ chạy khi push tag v* — build IPA unsigned và upload.
  # Muốn IPA signed cho App Store: thêm secrets APPLE_CERT_P12, APPLE_CERT_PASSWORD,
  # PROVISIONING_PROFILE và mở khối signed bên dưới.
  build-ios:
    name: Build iOS IPA (unsigned)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.19.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Diagnostic — flutter doctor
        run: flutter doctor -v

      - run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr ../../../lo-${{ github.ref_name }}-unsigned.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ipa-unsigned-${{ github.ref_name }}
          path: lo-${{ github.ref_name }}-unsigned.ipa
          retention-days: 30

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-ios]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.ipa" -o -name "*.zip" \) \
            -exec cp {} release/ \;
          ls -lh release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
